<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ShopEasy Customer Support AI Chatbot - Get instant answers to your FAQ queries about orders, shipping, returns, payments, and accounts.">
    <title>ShopEasy - Smart AI Support Assistant</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(22, 24, 38, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-gradient: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            --primary-glow: rgba(124, 58, 237, 0.4);
            --bot-bubble: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(124, 58, 237, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(79, 70, 229, 0.12) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Container Layout */
        .chat-container {
            width: 90%;
            max-width: 850px;
            height: 85vh;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            animation: containerAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes containerAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Style */
        .chat-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 16, 28, 0.4);
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bot-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .bot-avatar svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
        }

        .bot-details h1 {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .status-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-green);
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--accent-green);
            animation: pulse 2s infinite;
            left: 0;
            top: 0;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .status-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Scrollable Message Box */
        .chat-messages {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Customize Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Chat Bubbles */
        .message {
            display: flex;
            max-width: 75%;
            animation: bubbleAppear 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes bubbleAppear {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        /* Bot Message specifics */
        .message.bot {
            align-self: flex-start;
        }

        .message.bot .message-content {
            background: var(--bot-bubble);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        /* User Message specifics */
        .message.user {
            align-self: flex-end;
        }

        .message.user .message-content {
            background: var(--primary-gradient);
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.25);
        }

        /* Rich Content Styles (Inside bot replies) */
        .message-content p {
            margin-bottom: 8px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul, .message-content ol {
            margin-left: 20px;
            margin-bottom: 8px;
        }

        .message-content li {
            margin-bottom: 4px;
        }

        .message-content strong {
            color: #ffffff;
            font-weight: 600;
        }

        .message.user .message-content strong {
            color: #ffffff;
        }

        /* Typing Indicator Bubble */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 14px 22px;
            border-radius: 18px;
            background: var(--bot-bubble);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            animation: bubbleAppear 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-muted);
            border-radius: 50%;
            opacity: 0.4;
            animation: blink 1.4s infinite both;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            50% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        /* Input Form Area */
        .chat-input-form {
            padding: 20px 28px;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 16, 28, 0.4);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
        }

        .chat-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        /* Send Button */
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            border: none;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.25);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
            transition: transform 0.2s ease;
        }

        .send-btn:hover svg {
            transform: translate(1px, -1px);
        }

        /* Error Banner/Notification */
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            body {
                align-items: flex-start;
                padding-top: 15px;
            }
            .chat-container {
                width: 95%;
                height: 90vh;
                border-radius: 16px;
            }
            .chat-header {
                padding: 14px 20px;
            }
            .chat-messages {
                padding: 16px 20px;
            }
            .chat-input-form {
                padding: 14px 20px;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-info">
                <div class="bot-avatar">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2a10 10 0 0 0-10 10c0 4.14 2.5 7.69 6 9.2A10 10 0 0 0 12 22a10 10 0 0 0 10-10A10 10 0 0 0 12 2zm1 16h-2v-2h2v2zm0-4h-2V7h2v7z"/>
                        <circle cx="8" cy="11" r="1.5" fill="#fff"/>
                        <circle cx="16" cy="11" r="1.5" fill="#fff"/>
                        <path d="M12 15.5c-2.33 0-4.31-1.46-5.12-3.5h10.24c-.81 2.04-2.79 3.5-5.12 3.5z" fill="#fff"/>
                    </svg>
                </div>
                <div class="bot-details">
                    <h1 id="chat-title">ShopEasy Assistant</h1>
                    <div class="status-wrapper">
                        <div class="status-dot" id="online-indicator"></div>
                        <span class="status-text">AI Agent • Online</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Messages Area -->
        <main class="chat-messages" id="chat-messages-box">
            <!-- Welcome message -->
            <div class="message bot">
                <div class="message-content">
                    <p>Hello! I am your <strong>ShopEasy FAQ Assistant</strong>.</p>
                    <p>Ask me anything about orders, shipping, returns, refunds, payments, accounts, or active offers. How can I help you today?</p>
                </div>
            </div>
        </main>

        <!-- Footer / Input form -->
        <form class="chat-input-form" id="chat-form" autocomplete="off">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="message-input" 
                    class="chat-input" 
                    placeholder="Ask about orders, shipping, returns..." 
                    required 
                    aria-label="Ask a question"
                >
            </div>
            <button type="submit" id="send-button" class="send-btn" aria-label="Send message">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </form>
    </div>

    <!-- Script logic -->
    <script>
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const chatMessagesBox = document.getElementById('chat-messages-box');

        // Autoscroll helper
        function scrollToBottom() {
            chatMessagesBox.scrollTop = chatMessagesBox.scrollHeight;
        }

        // Format system text (basic parser for md formatting: bold, lists, paragraphs)
        function formatMessageText(text) {
            // Escape HTML
            let formatted = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            // Format Bold: **text**
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Format Lists: lines starting with '-' or '*'
            const lines = formatted.split('\n');
            let insideList = false;
            let listHtml = [];

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                
                // Matches standard bullet: - text or * text
                if (line.startsWith('- ') || line.startsWith('* ')) {
                    if (!insideList) {
                        listHtml.push('<ul>');
                        insideList = true;
                    }
                    listHtml.push(`<li>${line.substring(2)}</li>`);
                } else {
                    if (insideList) {
                        listHtml.push('</ul>');
                        insideList = false;
                    }
                    if (line) {
                        listHtml.push(`<p>${line}</p>`);
                    } else {
                        // Double newline acts as separator
                        listHtml.push('<div style="height: 6px;"></div>');
                    }
                }
            }

            if (insideList) {
                listHtml.push('</ul>');
            }

            return listHtml.join('\n');
        }

        // Add message to container
        function appendMessage(sender, text, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('message-content');
            
            if (isError) {
                contentDiv.innerHTML = `
                    <div class="error-message">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <span>${text}</span>
                    </div>
                `;
            } else if (sender === 'bot') {
                contentDiv.innerHTML = formatMessageText(text);
            } else {
                // For user, keep plain text
                const p = document.createElement('p');
                p.textContent = text;
                contentDiv.appendChild(p);
            }

            messageDiv.appendChild(contentDiv);
            chatMessagesBox.appendChild(messageDiv);
            scrollToBottom();
        }

        // Show/hide typing indicator
        let typingIndicatorEl = null;

        function showTypingIndicator() {
            if (typingIndicatorEl) return;
            
            typingIndicatorEl = document.createElement('div');
            typingIndicatorEl.classList.add('typing-indicator');
            typingIndicatorEl.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatMessagesBox.appendChild(typingIndicatorEl);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            if (typingIndicatorEl) {
                typingIndicatorEl.remove();
                typingIndicatorEl = null;
            }
        }

        // Submit form handler
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = messageInput.value.trim();
            if (!message) return;

            // Clear input field
            messageInput.value = '';
            
            // Append user message
            appendMessage('user', message);
            
            // Show bot typing indicator
            showTypingIndicator();

            try {
                // Post to API endpoint
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                removeTypingIndicator();

                if (response.ok && data.success) {
                    appendMessage('bot', data.response);
                } else {
                    appendMessage('bot', data.error || 'Failed to generate response.', true);
                }
            } catch (err) {
                removeTypingIndicator();
                appendMessage('bot', 'A connection error occurred. Make sure the server is running.', true);
                console.error(err);
            }
        });
    </script>
</body>
</html>
